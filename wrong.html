<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Wrong</title>
  <style>
    html,body{height:100%}
    body{margin:0; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Yu Gothic","Meiryo",sans-serif;}
    .bg{
      position:fixed; inset:0;
      background:url("wrong.jpg") center / cover no-repeat;
    }
    .overlay{
      position:fixed; inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.25), rgba(0,0,0,.35));
      display:grid;
      place-items:end center;
      padding:28px 18px;
      box-sizing:border-box;
    }
    .card{
      width:min(760px,92vw);
      border-radius:22px;
      background:rgba(255,255,255,.82);
      backdrop-filter:blur(10px);
      box-shadow:0 22px 60px rgba(0,0,0,.25);
      padding:18px 16px;
      text-align:center;
    }
    .title{margin:4px 0 10px; font-weight:900; letter-spacing:.08em;}
    .btn{
      border:none; border-radius:14px;
      padding:12px 16px;
      font-weight:900;
      cursor:pointer;
      background:linear-gradient(180deg,#ff77a7,#ff4f86);
      color:#fff;
      box-shadow:0 18px 40px rgba(255,79,134,.28);
      width:min(280px,80vw);
    }
    .note{margin:10px 0 0; opacity:.75; font-weight:700; font-size:13px;}
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="overlay">
    <div class="card">
      <div class="title">パスワードが違います</div>
      <button class="btn" id="backBtn">もう一度入力する</button>
      <div class="note">ボタンを押すとロック画面に戻ります</div>
    </div>
  </div>

  <script>
    document.getElementById("backBtn").addEventListener("click", ()=>{
      location.href = "index.html";
    });
  </script>
</body>
</html>
