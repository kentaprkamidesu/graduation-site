<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Graduation - Lock</title>
  <style>
    :root{
      --ink:#1b1b1b;
      --pink:#ff4f86;
      --card:rgba(255,255,255,.78);
      --shadow:0 25px 70px rgba(0,0,0,.16);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Yu Gothic","Meiryo",sans-serif;
      color:var(--ink);
      overflow:hidden; /* ロック画面はスクロールさせない */
      background:#fff;
    }

    /* うっすら桜っぽい背景 */
    .sakuraBg{
      position:fixed; inset:0;
      background:
        radial-gradient(1200px 600px at 20% 10%, rgba(255,214,225,.55), transparent 60%),
        radial-gradient(900px 600px at 90% 20%, rgba(255,200,220,.35), transparent 60%),
        radial-gradient(900px 700px at 40% 90%, rgba(190,225,255,.35), transparent 65%),
        linear-gradient(180deg,#fff6f9,#f6fbff);
      z-index:-3;
    }
    .sakuraBg::after{
      content:"";
      position:absolute; inset:0;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255,170,190,.24) 0 2px, transparent 3px),
        radial-gradient(circle at 25% 35%, rgba(255,170,190,.18) 0 2px, transparent 3px),
        radial-gradient(circle at 70% 25%, rgba(255,170,190,.18) 0 2px, transparent 3px),
        radial-gradient(circle at 85% 40%, rgba(255,170,190,.22) 0 2px, transparent 3px),
        radial-gradient(circle at 40% 75%, rgba(255,170,190,.18) 0 2px, transparent 3px),
        radial-gradient(circle at 60% 85%, rgba(255,170,190,.22) 0 2px, transparent 3px);
      background-size:260px 260px;
      filter:blur(.2px);
      z-index:-2;
    }

    .center{
      min-height:100svh;
      display:grid;
      place-items:center;
      padding:32px 16px;
    }

    .card{
      width:min(920px,92vw);
      border-radius:28px;
      background:var(--card);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
      padding:28px 22px;
      text-align:center;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(0,0,0,.06);
      font-size:12px;
      letter-spacing:.12em;
      font-weight:900;
    }
    .badge .dot{
      width:10px;height:10px;border-radius:50%;
      background:linear-gradient(180deg,#ff9db7,#ff4f86);
      box-shadow:0 8px 18px rgba(255,79,134,.35);
    }

    h1{
      margin:18px 0 6px;
      font-size:clamp(26px,4.4vw,44px);
      font-weight:1000;
      letter-spacing:.06em;
    }
    p{margin:0}

    .sub{
      margin-top:6px;
      opacity:.78;
      font-weight:800;
    }

    form{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }
    input{
      width:min(420px,74vw);
      height:46px;
      border-radius:14px;
      border:1px solid rgba(0,0,0,.10);
      padding:0 14px;
      font-size:16px;
      outline:none;
      background:rgba(255,255,255,.92);
    }
    button{
      height:46px;
      border:none;
      border-radius:14px;
      padding:0 18px;
      font-weight:1000;
      letter-spacing:.08em;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(180deg,#ff77a7,#ff4f86);
      box-shadow:0 18px 40px rgba(255,79,134,.28);
    }
    .err{
      margin:12px 0 0;
      min-height:1.4em;
      color:#b00020;
      font-weight:1000;
    }
    .hint{
      margin-top:14px;
      font-size:13px;
      opacity:.7;
      font-weight:800;
    }
    .shake{ animation:shake .38s ease; }
    @keyframes shake{
      0%{transform:translateX(0)}
      20%{transform:translateX(-10px)}
      40%{transform:translateX(10px)}
      60%{transform:translateX(-7px)}
      80%{transform:translateX(7px)}
      100%{transform:translateX(0)}
    }
  </style>
</head>
<body>
  <div class="sakuraBg"></div>

  <div class="center">
    <div class="card" id="card">
      <div class="badge"><span class="dot"></span>GRADUATION</div>
      <h1>卒業おめでとう</h1>
      <p class="sub">パスワードを入力してください</p>

      <form id="lockForm" autocomplete="off">
        <input id="pw" type="password" placeholder="Password" required />
        <button type="submit">入る</button>
      </form>

      <div id="err" class="err"></div>
      <div class="hint">※ ipadとパソコン表示にのみ対応しています。スマホは非対応です</div>
    </div>
  </div>

  <script>
    // ===== ここだけ変更OK：パスワード =====
    const PASSWORD = "kuwazoesan"; // ←好きに変更OK（半角推奨）

    // すでに通過してたら site.html へ
    if (sessionStorage.getItem("passed") === "yes") {
      location.href = "site.html";
    }

    const form = document.getElementById("lockForm");
    const pw = document.getElementById("pw");
    const err = document.getElementById("err");
    const card = document.getElementById("card");

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const input = (pw.value || "").trim();

      if (input === PASSWORD) {
        sessionStorage.setItem("passed", "yes");
        location.href = "site.html";
      } else {
        // ミスは別ページへ
        sessionStorage.removeItem("passed");
        location.href = "wrong.html";
      }
    });
  </script>
</body>
</html>
