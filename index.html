<!doctype html>
<html lang="ja">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Graduation Lock</title>
  <style>
    html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;}
    body{overflow:hidden;background:#fff;}
    .sakuraBg{position:fixed;inset:0;
      background:
        radial-gradient(1200px 600px at 20% 10%, rgba(255,214,225,.55), transparent 60%),
        radial-gradient(900px 600px at 90% 20%, rgba(255,200,220,.35), transparent 60%),
        radial-gradient(900px 700px at 40% 90%, rgba(190,225,255,.35), transparent 65%),
        linear-gradient(180deg,#fff6f9,#f6fbff);
      z-index:-2;}
    .wrap{position:fixed;inset:0;display:grid;place-items:center;padding:24px;}
    .card{width:min(820px,92vw);background:rgba(255,255,255,.80);backdrop-filter:blur(12px);
      border-radius:22px;padding:34px 28px;box-shadow:0 25px 70px rgba(0,0,0,.18);text-align:center;}
    .badge{display:inline-flex;align-items:center;padding:8px 14px;border-radius:999px;background:rgba(0,0,0,.06);
      font-size:12px;letter-spacing:.12em;margin-bottom:12px;}
    .title{font-size:46px;margin:10px 0 8px;}
    .sub{margin:0 0 18px;opacity:.8;}
    form{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px;}
    input{width:min(520px,62vw);height:46px;border-radius:12px;border:1px solid rgba(0,0,0,.12);padding:0 14px;font-size:16px;outline:none;}
    button{height:46px;padding:0 18px;border:none;border-radius:12px;background:#ff6b9a;color:#fff;font-weight:800;cursor:pointer;
      box-shadow:0 10px 25px rgba(255,107,154,.35);}
    .err{height:22px;margin:12px 0 0;color:#d6455d;font-weight:700;}
    .hint{margin-top:10px;font-size:12px;opacity:.75;}
    .shake{animation:shake .32s ease;}
    @keyframes shake{0%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}100%{transform:translateX(0)}}
/* ====== 全端末対応の土台 ====== */
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
img, video { max-width: 100%; height: auto; display: block; }

/* iPhoneのアドレスバー問題対策：100svh を優先 */
.fullscreen {
  min-height: 100vh;
  min-height: 100svh;
  min-height: 100dvh;
  width: 100%;
  display: grid;
  place-items: center;
  padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
}

/* 中身のカードがデカすぎて途切れないように */
.card {
  width: min(920px, 92vw);
  border-radius: 24px;
}

/* 文字が端末に合わせて伸び縮みする */
.title {
  font-size: clamp(28px, 6vw, 56px);
  line-height: 1.15;
}
.bigZero {
  font-size: clamp(72px, 18vw, 180px);
  line-height: 1;
}

  </style>
</head>
<body>
  <div class="sakuraBg"></div>

  <div class="wrap">
    <div class="card" id="card">
      <div class="badge">GRADUATION</div>
      <h1 class="title">こんにtは</h1>
   

      <form id="lockForm" autocomplete="off">
        <input id="pw" type="password" placeholder="Password" required />
        <button type="submit">入る</button>
      </form>

      <p id="err" class="err"></p>
      <div class="hint">※ クラスで共有されたパスワードを入力してください</div>
    </div>
  </div>

  <script>
    const PASSWORD = "kuwazoekeisyu"; // ←ここを変更OK
    const form = document.getElementById("lockForm");
    const pw = document.getElementById("pw");
    const err = document.getElementById("err");
    const card = document.getElementById("card");

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      if (pw.value === PASSWORD) {
        location.href = "site.html";   // 正解→本体
      } else {
        err.textContent = "パスワードが違います。";
        card.classList.remove("shake");
        void card.offsetWidth;
        card.classList.add("shake");
        pw.select();
        setTimeout(()=> location.href = "wrong.html", 180); // ミス→ミス用サイト
      }
    });
  </script>
</body>
</html>
