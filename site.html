<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Graduation</title>
  <style>
    :root{
      --ink:#1b1b1b;
      --pink:#ff4f86;
      --card:rgba(255,255,255,.70);
      --shadow:0 25px 70px rgba(0,0,0,.16);
    }
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic","Meiryo",sans-serif;
      color:var(--ink);
      overflow-x:hidden;
      background:#fff;
    }

    /* 背景 */
    .sakuraBg{
      position:fixed; inset:0;
      background:
        radial-gradient(1200px 600px at 20% 10%, rgba(255,214,225,.55), transparent 60%),
        radial-gradient(900px 600px at 90% 20%, rgba(255,200,220,.35), transparent 60%),
        radial-gradient(900px 700px at 40% 90%, rgba(190,225,255,.35), transparent 65%),
        linear-gradient(180deg,#fff6f9,#f6fbff);
      z-index:-3;
    }
    .sakuraBg::after{
      content:"";
      position:absolute; inset:0;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255,170,190,.25) 0 2px, transparent 3px),
        radial-gradient(circle at 25% 35%, rgba(255,170,190,.18) 0 2px, transparent 3px),
        radial-gradient(circle at 70% 25%, rgba(255,170,190,.18) 0 2px, transparent 3px),
        radial-gradient(circle at 85% 40%, rgba(255,170,190,.22) 0 2px, transparent 3px),
        radial-gradient(circle at 40% 75%, rgba(255,170,190,.18) 0 2px, transparent 3px),
        radial-gradient(circle at 60% 85%, rgba(255,170,190,.22) 0 2px, transparent 3px);
      background-size:260px 260px;
      filter:blur(.2px);
      z-index:-2;
    }

    /* 3ページ縦スクロール：スマホでも安定 */
    .page{
      min-height:100svh;
      display:grid;
      place-items:center;
      padding:28px 16px;
      box-sizing:border-box;
      position:relative;
    }

    /* 1ページ目（カウント） */
    .heroCard{
      position:relative;
      z-index:2;
      width:min(980px,92vw);
      background:var(--card);
      backdrop-filter:blur(12px);
      border-radius:26px;
      padding:34px 26px;
      box-shadow:var(--shadow);
      text-align:center;
    }
    .mini{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(0,0,0,.06);
      font-size:12px;
      letter-spacing:.12em;
      font-weight:900;
    }
    .heroLine{
      margin:14px 0 8px;
      font-size:clamp(20px,3.2vw,34px);
      font-weight:900;
      letter-spacing:.06em;
    }
    .bigZeroWrap{
      display:flex;
      justify-content:center;
      align-items:baseline;
      gap:10px;
      margin-top:10px;
    }
    .bigZero{
      font-size:clamp(120px,16vw,240px);
      font-weight:1000;
      line-height:1;
      color:#ff4f86;
      text-shadow:0 2px 0 rgba(255,255,255,.55), 0 18px 45px rgba(0,0,0,.22);
    }
    .dayLabel{
      font-size:clamp(26px,4vw,48px);
      font-weight:900;
      opacity:.95;
    }
    .subNote{
      margin:10px 0 0;
      opacity:.8;
      font-weight:700;
    }
    .scrollBtn{
      margin-top:18px;
      display:inline-flex;
      gap:10px;
      align-items:center;
      padding:12px 18px;
      border-radius:999px;
      background:rgba(255,255,255,.85);
      border:1px solid rgba(0,0,0,.08);
      cursor:pointer;
      user-select:none;
      font-weight:900;
      box-shadow:0 14px 40px rgba(0,0,0,.12);
    }
    .arrow{font-size:18px; transform:translateY(1px);}

    /* 2ページ目：横スワイプ写真 */
    .galleryWrap{
      width:min(1100px,94vw);
      border-radius:28px;
      overflow:hidden;
      box-shadow:var(--shadow);
      background:rgba(255,255,255,.55);
      backdrop-filter:blur(10px);
    }
    .gallery{
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
}

.slide{
  flex: 0 0 100%;
  scroll-snap-align: start;
}

    }
    .gallery::-webkit-scrollbar{display:none;}
    .slide{
      scroll-snap-align:center;
      flex:0 0 100%;
      aspect-ratio: 16 / 9;
      min-height:min(70vh,520px);
      position:relative;
      background:#eee center/cover no-repeat;
    }
    .slide::after{
      content:"";
      position:absolute; inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.00), rgba(0,0,0,.20));
      pointer-events:none;
    }
    .namePlate{
      position:absolute;
      left:clamp(16px,3vw,28px);
      top:clamp(16px,3vw,28px);
      max-width:min(520px,88vw);
      border-radius:22px;
      padding:18px 18px;
      background:rgba(255,255,255,.82);
      backdrop-filter:blur(10px);
      box-shadow:0 18px 50px rgba(0,0,0,.18);
    }
    .jpSmall{font-size:clamp(14px,2.2vw,18px); opacity:.8; font-weight:800; letter-spacing:.08em;}
    .jpName{margin:6px 0 6px; font-size:clamp(26px,4.4vw,44px); font-weight:1000; letter-spacing:.06em;}
    .enName{font-size:clamp(14px,2.2vw,18px); opacity:.75; font-weight:800; letter-spacing:.16em;}
    .hintSwipe{
      text-align:center;
      padding:12px 14px;
      font-weight:900;
      letter-spacing:.08em;
      opacity:.78;
      font-size:13px;
      border-top:1px solid rgba(0,0,0,.06);
    }

    /* 3ページ目：動画フルスクリーン */
    .videoPage{padding:0; background:#000;}
    .videoWrap{
      position:absolute; inset:0;
    }
    .videoWrap video{
      position:absolute; inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#000;
    }

    /* 紙吹雪（入場エフェクト） */
    #confetti{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:9999;
      display:none;
    }

    /* 画像が見つからない時の表示 */
    .missing{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      color:#000;
      font-weight:1000;
      letter-spacing:.08em;
      background:repeating-linear-gradient(45deg,#fff,#fff 10px,#f3f3f3 10px,#f3f3f3 20px);
    }
  </style>
</head>
<body>
  <div class="sakuraBg"></div>
  <canvas id="confetti"></canvas>

  <!-- 1ページ目 -->
  <section class="page" id="page1">
    <div class="heroCard">
      <div class="mini">GRADUATION COUNTDOWN</div>
      <div class="heroLine">卒業まで、、、あと</div>
      <div class="bigZeroWrap">
        <div class="bigZero" id="daysLeft">0</div>
        <div class="dayLabel">日</div>
      </div>
      <div class="subNote" id="dateNote">卒業日：----</div>

      <div class="scrollBtn" id="toPage2" role="button" tabindex="0">
        <span class="arrow">↓</span><span>スクロールして次へ</span>
      </div>
    </div>
  </section>
//-----------------------------------------------------------------------------------
  <!-- 2ページ目（横スワイプ写真） -->
  <section class="page" id="page2">
    <div class="galleryWrap">
      <div class="gallery" id="gallery">
        <div class="slide" id="slide1"></div>
        <div class="slide" id="slide2"></div>
        <div class="slide" id="slide3"></div>
        <div class="slide" id="slide4"></div>
        <div class="slide" id="slide5"></div>

      </div>
      <div class="hintSwipe">← 横にスワイプすると写真が切り替わる →</div>
    </div>

    <div class="scrollBtn" id="toPage3" role="button" tabindex="0" style="margin-top:18px;">
      <span class="arrow">↓</span><span>最後の動画へ</span>
    </div>
  </section>

  <!-- 3ページ目（動画フルスクリーン） -->
  <section class="page videoPage" id="page3">
    <div class="videoWrap">
      <video id="bgVideo" playsinline muted loop controls>
        <source src="bg.mp4" type="video/mp4" />
      </video>
    </div>
  </section>

  <script>
    // ===== ロックチェック（site.html直開き対策） =====
    if (sessionStorage.getItem("passed") !== "yes") {
      location.href = "index.html";
    }

    // ===== 卒業日 =====
    const GRAD_DATE = "2026-03-11"; // 変えるならここだけ
    function calcDaysLeft(){
      const today = new Date();
      const grad  = new Date(GRAD_DATE + "T00:00:00");
      const diff  = grad.getTime() - today.getTime();
      const days  = Math.ceil(diff / (1000*60*60*24));
      return Math.max(0, days);
    }
    function updateCountdown(){
      document.getElementById("daysLeft").textContent = String(calcDaysLeft());
      document.getElementById("dateNote").textContent = "卒業日： " + GRAD_DATE;
    }
    updateCountdown();

    // ===== スクロール誘導 =====
    const page2 = document.getElementById("page2");
    const page3 = document.getElementById("page3");
    document.getElementById("toPage2").addEventListener("click", ()=>page2.scrollIntoView({behavior:"smooth"}));
    document.getElementById("toPage2").addEventListener("keydown", (e)=>{ if(e.key==="Enter") page2.scrollIntoView({behavior:"smooth"}); });

    document.getElementById("toPage3").addEventListener("click", ()=>page3.scrollIntoView({behavior:"smooth"}));
    document.getElementById("toPage3").addEventListener("keydown", (e)=>{ if(e.key==="Enter") page3.scrollIntoView({behavior:"smooth"}); });
//===========================================================================================================================
    // ===== 写真が消えないように：画像の存在チェックして確実に背景へ反映 
    const images = ["main.jpg","main2.jpg","main3.jpg","main4.jpg","main5.jpg"];
const slides = [
  document.getElementById("slide1"),
  document.getElementById("slide2"),
  document.getElementById("slide3"),
  document.getElementById("slide4"),
  document.getElementById("slide5"),
];


    function setSlideBackground(slideEl, filename){
      const img = new Image();
      img.onload = ()=>{
        slideEl.style.backgroundImage = `url("${filename}")`;
      };
      img.onerror = ()=>{
        slideEl.innerHTML += `<div class="missing">画像が見つからない：${filename}</div>`;
      };
      img.src = filename + "?v=" + Date.now(); // キャッシュ事故を避ける
    }
    for (let i = 0; i < slides.length; i++) {
  if (!slides[i]) continue;
  setSlideBackground(slides[i], images[i]);
}


    // ===== 動画：最初から大画面＆自動再生を試す（失敗したら手動OK） =====
    const video = document.getElementById("bgVideo");
    function safePlayVideo(){
      video.muted = true;
      const p = video.play();
      if(p && typeof p.catch === "function") p.catch(()=>{ /* 自動再生ブロック時は何もしない */ });
    }
    // 画面に入ったら再生（IntersectionObserver）
    const io = new IntersectionObserver((entries)=>{
      for(const ent of entries){
        if(ent.isIntersecting) safePlayVideo();
      }
    }, {threshold:0.35});
    io.observe(page3);

    // ===== 入場エフェクト：両斜めから紙吹雪（1回だけ） =====
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");
    function resizeConfetti(){
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    }
    window.addEventListener("resize", resizeConfetti);
    resizeConfetti();

    function burstConfetti(){
      canvas.style.display = "block";
      const W = window.innerWidth;
      const H = window.innerHeight;
      const pieces = [];
      const palette = ["#ff6b9a","#ffd1dc","#ffffff","#ffe6a7","#ff9ec4","#bfe3ff"];

      function rand(a,b){ return a + Math.random()*(b-a); }

      function addSide(side){
        const baseX = side==="L" ? -40 : W+40;
        const baseY = rand(H*0.25, H*0.65);
        for(let i=0;i<90;i++){
          const vx = side==="L" ? rand(3.8,7.2) : rand(-7.2,-3.8);
          const vy = rand(-6.8,-2.2);
          const spin = rand(-0.22,0.22);
          pieces.push({
            x: baseX, y: baseY,
            vx, vy,
            g: rand(0.12,0.18),
            w: rand(6,12),
            h: rand(8,16),
            a: rand(0, Math.PI*2),
            va: spin,
            life: rand(90,150),
            opacity: 1,
            c: palette[Math.floor(Math.random()*palette.length)]
          });
        }
      }

      addSide("L");
      addSide("R");

      let frame = 0;
      function tick(){
        frame++;
        ctx.clearRect(0,0,W,H);
        for(let i=pieces.length-1;i>=0;i--){
          const p = pieces[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += p.g;
          p.a += p.va;
          p.life--;

          if(p.life < 40) p.opacity = p.life / 40;

          ctx.save();
          ctx.globalAlpha = Math.max(0, Math.min(1, p.opacity));
          ctx.translate(p.x, p.y);
          ctx.rotate(p.a);
          ctx.fillStyle = p.c;
          ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
          ctx.restore();

          if(p.life <= 0 || p.y > H+80) pieces.splice(i,1);
        }

        if(pieces.length > 0 && frame < 220){
          requestAnimationFrame(tick);
        }else{
          ctx.clearRect(0,0,W,H);
          canvas.style.display = "none";
        }
      }
      tick();
    }

    // 入場で1回だけ
    const onceKey = "confetti_once_done";
    if(!sessionStorage.getItem(onceKey)){
      sessionStorage.setItem(onceKey,"yes");
      // ちょい遅らせて気持ちよく出す
      setTimeout(burstConfetti, 350);
    }
  </script>
</body>
</html>
