<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Graduation</title>
  <style>
    :root{
      --ink:#1b1b1b;
      --pink:#ff4f86;
      --card:rgba(255,255,255,.70);
      --shadow:0 25px 70px rgba(0,0,0,.16);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Yu Gothic","Meiryo",sans-serif;
      color:var(--ink);
      overflow-x:hidden;
      background:#fff;
    }

    /* 背景（桜っぽい） */
    .sakuraBg{
      position:fixed; inset:0;
      background:
        radial-gradient(1200px 600px at 20% 10%, rgba(255,214,225,.55), transparent 60%),
        radial-gradient(900px 600px at 90% 20%, rgba(255,200,220,.35), transparent 60%),
        radial-gradient(900px 700px at 40% 90%, rgba(190,225,255,.35), transparent 65%),
        linear-gradient(180deg,#fff6f9,#f6fbff);
      z-index:-3;
    }
    .sakuraBg::after{
      content:"";
      position:absolute; inset:0;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255,170,190,.24) 0 2px, transparent 3px),
        radial-gradient(circle at 25% 35%, rgba(255,170,190,.18) 0 2px, transparent 3px),
        radial-gradient(circle at 70% 25%, rgba(255,170,190,.18) 0 2px, transparent 3px),
        radial-gradient(circle at 85% 40%, rgba(255,170,190,.22) 0 2px, transparent 3px),
        radial-gradient(circle at 40% 75%, rgba(255,170,190,.18) 0 2px, transparent 3px),
        radial-gradient(circle at 60% 85%, rgba(255,170,190,.22) 0 2px, transparent 3px);
      background-size:260px 260px;
      filter:blur(.2px);
      z-index:-2;
    }

    /* 3ページ縦スクロール */
    .page{
      min-height:100svh;
      display:grid;
      place-items:center;
      padding:28px 16px;
      position:relative;
    }

    /* 1ページ目：カウント */
    .heroCard{
      width:min(980px,92vw);
      background:var(--card);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border-radius:26px;
      padding:34px 26px;
      box-shadow:var(--shadow);
      text-align:center;
      position:relative;
      z-index:2;
    }

    .mini{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(0,0,0,.06);
      font-size:12px;
      letter-spacing:.12em;
      font-weight:1000;
    }
    .heroLine{
      margin:14px 0 8px;
      font-size:clamp(20px,3.2vw,34px);
      font-weight:1000;
      letter-spacing:.06em;
    }
    .bigZeroWrap{
      display:flex;
      justify-content:center;
      align-items:baseline;
      gap:10px;
      margin-top:10px;
    }
    .bigZero{
      font-size:clamp(120px,16vw,240px);
      font-weight:1000;
      line-height:1;
      color:#ff4f86;
      text-shadow:0 2px 0 rgba(255,255,255,.55), 0 18px 45px rgba(0,0,0,.22);
    }
    .dayLabel{
      font-size:clamp(26px,4vw,48px);
      font-weight:1000;
      opacity:.95;
    }
    .subNote{
      margin:10px 0 0;
      opacity:.8;
      font-weight:900;
    }
    .scrollBtn{
      margin-top:18px;
      display:inline-flex;
      gap:10px;
      align-items:center;
      padding:12px 18px;
      border-radius:999px;
      background:rgba(255,255,255,.85);
      border:1px solid rgba(0,0,0,.08);
      cursor:pointer;
      user-select:none;
      font-weight:1000;
      box-shadow:0 14px 40px rgba(0,0,0,.12);
    }
    .arrow{font-size:18px; transform:translateY(1px);}

    /* 2ページ目：横スワイプ写真（白枠/文字なし） */
    .galleryWrap{
      width:min(1100px,94vw);
      border-radius:28px;
      overflow:hidden;
      box-shadow:var(--shadow);
      background:rgba(255,255,255,.55);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }
    .gallery{
  display: flex;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  scroll-behavior: smooth;
}

.gallery::-webkit-scrollbar{
  display: none;
}
    .gallery::-webkit-scrollbar{display:none;}
   .slide{
  flex: 0 0 100%;
  scroll-snap-align: start;
  position: relative;
  background: #000 center / cover no-repeat;
  height: min(74vh, 560px);
}
    .hintSwipe{
      text-align:center;
      padding:12px 14px;
      font-weight:1000;
      letter-spacing:.08em;
      opacity:.75;
      font-size:13px;
      border-top:1px solid rgba(0,0,0,.06);
    }

    /* 3ページ目：動画フルスクリーン（音なし・自動再生・操作不可） */
    .videoPage{padding:0; background:#000;}
    .videoWrap{position:absolute; inset:0;}
    #bgVideo{
      position:absolute; inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#000;
      pointer-events:none; /* 操作不可 */
      user-select:none;
      -webkit-user-select:none;
    }
    #bgVideo::-webkit-media-controls{ display:none !important; }
    #bgVideo::-webkit-media-controls-enclosure{ display:none !important; }

    /* 紙吹雪キャンバス */
    #confetti{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:9999;
      display:none;
    }

    /* 画像が読めないとき用（保険） */
    .missing{
      position:absolute; inset:0;
      display:grid; place-items:center;
      color:#111;
      font-weight:1000;
      letter-spacing:.08em;
      background:repeating-linear-gradient(45deg,#fff,#fff 10px,#f3f3f3 10px,#f3f3f3 20px);
    }
/* 1ページ目のカレンダー画像たち */
#page1{
  position: relative;
  overflow: hidden;
}

#calendarWall{
  position: absolute;
  inset: 0;
  z-index: 4;
  pointer-events: none;
}

/* 1枚1枚のカレンダー画像 */
.calItem{
  position: absolute;
  width: 95px;
  height: auto;
  object-fit: contain;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,.16));
  opacity: 0.96;
}

/* 真ん中のカードは前面 */
.heroCard{
  position: relative;
  z-index: 3;
}
.mini,
.heroLine,
.bigZeroWrap,
.subNote,
.scrollBtn{
  position: relative;
  z-index: 6;
}
/* 手書きイラスト */
.doodle{
  position: absolute;
  z-index: 5;
  width: 120px;
  height: auto;
  pointer-events: none;
  object-fit: contain;
}

/* 左の絵 */
.doodleLeft{
  left: 340px;
  top: 235px;
}

/* 右の絵 */
.doodleRight{
  right: 334px;
  top: 220px;
}
  </style>
</head>

<body>
  <div class="sakuraBg"></div>
  <canvas id="confetti"></canvas>

  <!-- 1ページ目 -->
  <section class="page" id="page1">
    <div id="calendarWall"></div>
	<div class="heroCard">
      <div class="mini">GRADUATION COUNTDOWN</div>

      <div class="heroLine">卒業まで、、、あと</div>
      <div class="bigZeroWrap">
        <div class="bigZero" id="daysLeft">0</div>
        <div class="dayLabel">日</div>
      </div>
      <div class="subNote" id="dateNote">卒業式の日：----</div>

      <div class="scrollBtn" id="toPage2" role="button" tabindex="0">
        <span class="arrow">↓</span><span></span>
      </div>
    </div>
<img src="left-doodle.png" class="doodle doodleLeft" alt="">
<img src="right-doodle.png" class="doodle doodleRight" alt="">
  </section>

  <!-- 2ページ目（横スワイプ写真） -->#--------------------------学級通信から拾ってきているためほとんどの写真がぼやけています。あと画像を読み込むのに時間がかかることがあります。\n見れない場合は、、諦めてください。
  <section class="page" id="page2">
    <div class="galleryWrap">
      <div class="gallery" id="gallery">
        <div class="slide" id="slide1"></div>
        <div class="slide" id="slide2"></div>
        <div class="slide" id="slide3"></div>
	<div class="slide" id="slide4"></div>
	<div class="slide" id="slide5"></div>
	<div class="slide" id="slide6"></div>
	<div class="slide" id="slide7"></div>
	<div class="slide" id="slide8"></div>
	<div class="slide" id="slide9"></div>
	<div class="slide" id="slide10"></div>


      </div>
      <div class="hintSwipe">← 横にスワイプすると写真が切り替わります →</div>
    </div>

    <div class="scrollBtn" id="toPage3" role="button" tabindex="0" style="margin-top:18px;">
      <span class="arrow">↓</span><span></span>
    </div>
  </section>

  <!-- 3ページ目（動画フルスクリーン） -->
  <section class="page videoPage" id="page3">
    <div class="videoWrap">
      <video id="bgVideo" autoplay muted loop playsinline preload="auto">
        <source src="bg.mp4" type="video/mp4" />
      </video>
    </div>
  </section>

  <script>
    // ===== site.html 直開き対策（パス未通過なら戻す）=====
    if (sessionStorage.getItem("passed") !== "yes") {
      location.href = "index.html";
    }

    // ===== 卒業日（ここだけ変更OK）=====
    const GRAD_DATE = "2026-03-11";

    function calcDaysLeft(){
      const now = new Date();
      const grad = new Date(GRAD_DATE + "T00:00:00");
      const diff = grad.getTime() - now.getTime();
      const days = Math.ceil(diff / (1000*60*60*24));
      return Math.max(0, days);
    }
    document.getElementById("daysLeft").textContent = String(calcDaysLeft());
    document.getElementById("dateNote").textContent = "卒業日： " + GRAD_DATE;

    // ===== スクロール誘導 =====
    const page2 = document.getElementById("page2");
    const page3 = document.getElementById("page3");
    document.getElementById("toPage2").addEventListener("click", ()=>page2.scrollIntoView({behavior:"smooth"}));
    document.getElementById("toPage2").addEventListener("keydown", (e)=>{ if(e.key==="Enter") page2.scrollIntoView({behavior:"smooth"}); });

    document.getElementById("toPage3").addEventListener("click", ()=>page3.scrollIntoView({behavior:"smooth"}));
    document.getElementById("toPage3").addEventListener("keydown", (e)=>{ if(e.key==="Enter") page3.scrollIntoView({behavior:"smooth"}); });

    // ===== 写真：背景に確実にセット（ファイル名はこの配列だけ）=====#-------------------------------------------------------------------------------------------------------------
    // 追加したい時はここに "main4.jpg" みたいに増やす
    const images = ["main.jpg","main2.jpg","main3.jpg","main4.jpg","main5.jpg","main6.jpg","main7.jpg","main8.jpg","main9.jpg","main10.jpg"];
    const slides = [
      document.getElementById("slide1"),
      document.getElementById("slide2"),
      document.getElementById("slide3"),
      document.getElementById("slide4"),
      document.getElementById("slide5"),
      document.getElementById("slide6"),
      document.getElementById("slide7"),
      document.getElementById("slide8"),
      document.getElementById("slide9"),
     document.getElementById("slide10")
     
    ];

    function setSlideBackground(slideEl, filename){
      const img = new Image();
      img.onload = ()=>{ slideEl.style.backgroundImage = `url("${filename}")`; };
      img.onerror = ()=>{ slideEl.innerHTML = `<div class="missing">画像が見つからない：${filename}</div>`; };
      img.src = filename + "?v=" + Date.now(); // キャッシュ事故回避
    }
    for(let i=0;i<slides.length;i++){
      if(!slides[i]) continue;
      setSlideBackground(slides[i], images[i]);
    }

   // ===== 本物のループ：最後で「さらに同方向にスワイプ」した時だけ最初へ =====
const gallery = document.getElementById("gallery");
if (gallery) {
  const slideCount = gallery.querySelectorAll(".slide").length;

  const getSlideWidth = () => gallery.clientWidth; // 1枚=画面幅の想定
  const getIndex = () => {
    const w = getSlideWidth() || 1;
    return Math.round(gallery.scrollLeft / w);
  };

  const goIndex = (i) => {
    const w = getSlideWidth() || 1;
    gallery.scrollTo({ left: i * w, behavior: "smooth" });
  };

  // スワイプ方向検知用
  let startX = 0;
  let startIndex = 0;

  // スマホ：touch
  gallery.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    startIndex = getIndex();
  }, { passive: true });

  gallery.addEventListener("touchend", (e) => {
    const endX = e.changedTouches[0].clientX;
    const dx = endX - startX;

    // しきい値（小さい動きは無視）
    if (Math.abs(dx) < 40) return;

    const direction = dx < 0 ? "next" : "prev"; // next=右→左にスワイプ

    // ★ここが本体：最後で「next」したら最初へ
    if (startIndex >= slideCount - 1 && direction === "next") {
      goIndex(0);
      return;
    }

    // （オプション）最初で逆方向にスワイプしたら最後へもしたいならON
    // if (startIndex <= 0 && direction === "prev") {
    //   goIndex(slideCount - 1);
    //   return;
    // }
  }, { passive: true });

  // PC：マウスドラッグ（同じ動き）
  let mouseDown = false;
  let mouseStartX = 0;
  let mouseStartIndex = 0;

  gallery.addEventListener("mousedown", (e) => {
    mouseDown = true;
    mouseStartX = e.clientX;
    mouseStartIndex = getIndex();
  });

  window.addEventListener("mouseup", (e) => {
    if (!mouseDown) return;
    mouseDown = false;

    const dx = e.clientX - mouseStartX;
    if (Math.abs(dx) < 60) return;

    const direction = dx < 0 ? "next" : "prev";
    if (mouseStartIndex >= slideCount - 1 && direction === "next") {
      goIndex(0);
    }

    // 逆方向もループさせたいなら（上と同じでON）
    // if (mouseStartIndex <= 0 && direction === "prev") {
    //   goIndex(slideCount - 1);
    // }
  });
}

    // ===== 動画：操作不可を念押し =====
    const v = document.getElementById("bgVideo");
    if (v) {
      v.controls = false;
      v.disablePictureInPicture = true;
      v.setAttribute("controlsList", "nodownload noplaybackrate noremoteplayback");
    }

    // ===== 入場エフェクト：両斜めから紙吹雪（1回だけ）=====
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");

    function resizeConfetti(){
      const dpr = devicePixelRatio || 1;
      canvas.width = innerWidth * dpr;
      canvas.height = innerHeight * dpr;
      canvas.style.width = innerWidth + "px";
      canvas.style.height = innerHeight + "px";
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    addEventListener("resize", resizeConfetti);
    resizeConfetti();

    function burstConfetti(){
      canvas.style.display = "block";
      const W = innerWidth, H = innerHeight;
      const pieces = [];
      const palette = ["#ff6b9a","#ffd1dc","#ffffff","#ffe6a7","#ff9ec4","#bfe3ff"];
      const rand = (a,b)=>a+Math.random()*(b-a);

      function addSide(side){
        const baseX = side==="L" ? -40 : W+40;
        const baseY = rand(H*0.25, H*0.65);
        for(let i=0;i<90;i++){
          pieces.push({
            x: baseX, y: baseY,
            vx: side==="L" ? rand(3.8,7.2) : rand(-7.2,-3.8),
            vy: rand(-6.8,-2.2),
            g: rand(0.12,0.18),
            w: rand(6,12),
            h: rand(8,16),
            a: rand(0, Math.PI*2),
            va: rand(-0.22,0.22),
            life: rand(90,150),
            op: 1,
            c: palette[(Math.random()*palette.length)|0]
          });
        }
      }
      addSide("L"); addSide("R");

      let frame=0;
      (function tick(){
        frame++;
        ctx.clearRect(0,0,W,H);
        for(let i=pieces.length-1;i>=0;i--){
          const p=pieces[i];
          p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.a+=p.va; p.life--;
          if(p.life<40) p.op=p.life/40;

          ctx.save();
          ctx.globalAlpha = Math.max(0, Math.min(1, p.op));
          ctx.translate(p.x,p.y);
          ctx.rotate(p.a);
          ctx.fillStyle = p.c;
          ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
          ctx.restore();

          if(p.life<=0 || p.y>H+80) pieces.splice(i,1);
        }
        if(pieces.length>0 && frame<220) requestAnimationFrame(tick);
        else { ctx.clearRect(0,0,W,H); canvas.style.display="none"; }
      })();
    }

    const onceKey = "confetti_once_done";
    if(!sessionStorage.getItem(onceKey)){
      sessionStorage.setItem(onceKey,"yes");
      setTimeout(burstConfetti, 350);
    }
// ===== 1ページ目にカレンダー画像を敷き詰める =====
const calendarWall = document.getElementById("calendarWall");

const calendarImages = [
  "cal1.png","cal2.png","cal3.png","cal4.png","cal5.png",
  "cal6.png","cal7.png","cal8.png","cal9.png","cal10.png",
  "cal11.png","cal12.png","cal13.png","cal14.png","cal15.png",
  "cal16.png","cal17.png","cal18.png","cal19.png","cal20.png",
  "cal21.png","cal22.png","cal23.png"
];
// 配置場所（中央を避ける）
const positions = [
  /* ===== 左上 ===== */
  {top:"5%",  left:"2%",  rotate:"-6deg"},
  {top:"7%",  left:"13%", rotate:"4deg"},
  {top:"6%",  left:"27%", rotate:"-5deg"},

  /* ===== 右上 ===== */
  {top:"5%",  left:"63%", rotate:"3deg"},
  {top:"6%",  left:"77%", rotate:"-4deg"},
  {top:"5%",  left:"89%", rotate:"5deg"},

  /* ===== 左中 ===== */
  {top:"22%", left:"1%",  rotate:"-4deg"},
  {top:"28%", left:"12%", rotate:"3deg"},

  /* ===== 右中 ===== */
  {top:"22%", left:"82%", rotate:"-3deg"},
  {top:"30%", left:"91%", rotate:"4deg"},

  /* ===== 左下 ===== */
  {top:"66%", left:"2%",  rotate:"3deg"},
  {top:"73%", left:"14%", rotate:"-5deg"},
  {top:"78%", left:"28%", rotate:"4deg"},

  /* ===== 右下 ===== */
  {top:"67%", left:"67%", rotate:"-4deg"},
  {top:"72%", left:"80%", rotate:"3deg"},
  {top:"76%", left:"91%", rotate:"-3deg"},

  /* ===== 左の内側（でも中央には入れない） ===== */
  {top:"44%", left:"4%",  rotate:"2deg"},
  {top:"52%", left:"17%", rotate:"-4deg"},

  /* ===== 右の内側（でも中央には入れない） ===== */
  {top:"45%", left:"78%", rotate:"4deg"},
  {top:"53%", left:"90%", rotate:"-2deg"},

  /* ===== 左下寄り ===== */
  {top:"84%", left:"8%",  rotate:"2deg"},
  {top:"86%", left:"21%", rotate:"-3deg"},

  /* ===== 右下寄り ===== */
  {top:"84%", left:"74%", rotate:"3deg"},
  {top:"86%", left:"87%", rotate:"-4deg"}
];

calendarImages.forEach((src, i) => {
  if (!positions[i]) return;

  const img = document.createElement("img");
  img.src = src;
  img.className = "calItem";
  img.style.top = positions[i].top;
  img.style.left = positions[i].left;
  img.style.transform = `rotate(${positions[i].rotate})`;
  calendarWall.appendChild(img);
});
  </script>
</body>
</html>
